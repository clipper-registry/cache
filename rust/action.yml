name: Clipper Rust cache
description: >
  Incremental cargo cache on clipper volumes: mounts the target dir as a
  cache volume, turns on incremental compilation with content-hash
  freshness, and (optionally) caches the cargo registry. Requires a nightly
  toolchain for checksum-freshness; see the README.

inputs:
  repo:
    description: Registry repository holding the cache tags (e.g. clipper.dev/org/ci-cache).
    required: true
  key:
    description: Cache lineage key, typically job name plus arch (branch fallback is handled here).
    required: true
  base-branch:
    description: >
      Fallback lineage branch. Defaults to the pull request's base branch,
      else the repository's default branch.
    required: false
    default: ""
  additional-split-glob:
    description: Extra split globs (one per line) on top of the generated cargo set.
    required: false
    default: ""
  version:
    description: Clipper version to install; latest by default.
    required: false
    default: latest

outputs:
  cache-hit:
    description: Whether a cache tag mounted.
    value: ${{ steps.mount.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Cargo cache-friendly env
      shell: bash
      run: |
        echo "CARGO_INCREMENTAL=1" >> "$GITHUB_ENV"
        echo "CARGO_UNSTABLE_CHECKSUM_FRESHNESS=true" >> "$GITHUB_ENV"

    - name: Mount target cache
      id: mount
      uses: clipper-registry/cache@main
      with:
        path: target
        repo: ${{ inputs.repo }}
        key: ${{ inputs.key }}
        base-branch: ${{ inputs.base-branch }}
        split-glob: ${{ inputs.additional-split-glob }}
        cdc: "true"
        version: ${{ inputs.version }}

    - name: Compute split globs from the mounted layout
      shell: bash
      # Cargo makes one target/ subdir per --target triple, unknowable before
      # the build; on a warm mount the previous run's layout is already
      # visible, so the churny-dir globs are generated from it here (a cold
      # first run gets only the top-level profile globs and self-heals on the
      # next run). The push step picks these up via CLIPPER_CACHE_SPLIT_GLOB.
      run: |
        set -euo pipefail
        {
          echo 'CLIPPER_CACHE_SPLIT_GLOB<<CLIPPER_GLOBS'
          echo '.rustc_info.json'
          for prefix in "" $(find target -mindepth 1 -maxdepth 1 -type d \
              ! -name release ! -name debug -printf '%f/\n' 2>/dev/null); do
            for profile in release debug; do
              echo "${prefix}${profile}/.fingerprint/**"
              echo "${prefix}${profile}/incremental/**"
            done
          done
          echo 'CLIPPER_GLOBS'
        } >> "$GITHUB_ENV"
